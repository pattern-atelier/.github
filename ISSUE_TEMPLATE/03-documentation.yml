name: "📚 ドキュメント改善"
description: "ドキュメントの改善提案"
title: "[Docs] "
labels: ["documentation"]
type: docs
body:
  - type: markdown
    attributes:
      value: |
        ドキュメント改善のご提案ありがとうございます
  
  - type: input
    id: page
    attributes:
      label: 対象ドキュメント
      description: 対象のドキュメントページを指定してください
      placeholder: "例: README.md または docs/setup.md"
    validations:
      required: true
  
  - type: textarea
    id: issue
    attributes:
      label: 問題点
      description: 現在のドキュメントの何が問題かを説明してください
    validations:
      required: true
  
  - type: textarea
    id: suggestion
    attributes:
      label: 改善案
      description: どのように改善すべきかを提案してください
    validations:
      required: false
