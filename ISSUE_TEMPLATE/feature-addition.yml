name: 機能追加
description: 新しい機能をサイトに追加する
title: "[update] "
labels:
  - feature
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        機能追加リクエストをお送りいただきありがとうございます。
        以下の情報をご記入ください。

  - type: textarea
    id: overview
    attributes:
      label: 📋 概要
      description: 追加する機能について簡潔に説明してください
      placeholder: 機能の概要をここに入力
    validations:
      required: true

  - type: textarea
    id: target_page
    attributes:
      label: 🎯 対象ページ
      description: 対象となるページ、URLを記述してください
      placeholder: |
        例：
        - ページ名：ホーム画面
        - URL：https://example.com/home
    validations:
      required: true

  - type: textarea
    id: detailed_spec
    attributes:
      label: 📝 詳細な仕様
      description: 機能の詳細な仕様を説明してください
      placeholder: |
        - 機能の詳細
        - 入出力仕様
        - システムの動作
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 📅 スケジュール
        以下の日程を記入してください（YYYY-MM-DD形式）

  - type: input
    id: start_date
    attributes:
      label: 実装開始予定
      type: text
      placeholder: YYYY-MM-DD
    validations:
      required: false

  - type: input
    id: review_date
    attributes:
      label: レビュー予定
      type: text
      placeholder: YYYY-MM-DD
    validations:
      required: false

  - type: input
    id: release_date
    attributes:
      label: 本番反映予定
      type: text
      placeholder: YYYY-MM-DD
    validations:
      required: false

  - type: textarea
    id: remarks
    attributes:
      label: 📝 備考
      description: その他の情報や特記事項があれば記入してください
      placeholder: 追加の情報があればここに入力
    validations:
      required: false
