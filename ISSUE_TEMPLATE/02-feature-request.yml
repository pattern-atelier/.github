name: "✨ 機能リクエスト"
description: "新しい機能の提案をしてください"
title: "[Feature] "
labels: ["enhancement", "triage"]
type: feature
body:
  - type: markdown
    attributes:
      value: |
        新機能の提案をお待ちしています！
  
  - type: textarea
    id: description
    attributes:
      label: 機能の説明
      description: 実装したい機能について説明してください
    validations:
      required: true
  
  - type: textarea
    id: use_case
    attributes:
      label: 使用例
      description: この機能がどのように使われるか説明してください
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる方法はありますか？
    validations:
      required: false
  
  - type: checkboxes
    id: priority
    attributes:
      label: 優先度
      options:
        - label: 低
        - label: 中
        - label: 高
